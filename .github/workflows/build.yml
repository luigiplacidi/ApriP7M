name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # La libreria Core è cross-platform: test rapidi su Linux.
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore Core + Tests
        run: dotnet restore tests/ApriP7M.Core.Tests/ApriP7M.Core.Tests.csproj
      - name: Build Core
        run: dotnet build tests/ApriP7M.Core.Tests/ApriP7M.Core.Tests.csproj -c Release --no-restore
      - name: Test Core
        run: dotnet test tests/ApriP7M.Core.Tests/ApriP7M.Core.Tests.csproj -c Release --no-build

  # La build completa dell'app WinUI 3 richiede Windows.
  app-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore ApriP7M.sln
      - name: Build app (x64)
        run: dotnet build src/ApriP7M.App/ApriP7M.App.csproj -c Release -p:Platform=x64 --no-restore
