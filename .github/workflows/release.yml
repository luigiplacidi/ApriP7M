name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ApriP7M.sln

      - name: Test
        run: dotnet test tests/ApriP7M.Core.Tests/ApriP7M.Core.Tests.csproj -c Release --no-restore

      - name: Package standalone installer
        shell: pwsh
        run: ./build/Package-Release.ps1

      - name: Package Microsoft Store upload
        shell: pwsh
        run: ./build/Package-Store.ps1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Apri P7M Setup x64.exe
            artifacts/Apri P7M StoreUpload x64.msixupload
            artifacts/Apri P7M x64.msix
